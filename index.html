<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>SwimTracker</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <!-- BANNER -->
  <div class="banner">
    <div class="container">
      <h1>SwimTracker</h1>
      <h2>L'appli de suivi de performance de natation optimale</h2>
      <a href=" https://www.ffnatation.fr//" class="btn-yellow" target="_blank">Découvrir l'appli</a>
    </div>
  </div>

  <!-- CONTENU PRINCIPAL -->
  <div class="container">

    <h2>Thomas Coutarel</h2>
    <p class="subtitle">Fondateur & coach certifié FFN</p>
    <img class="avatar" src="photo.jpg" alt="Thomas Coutarel">

    <h2>Nos services</h2>
    <div class="cards">

      <div class="card">
        <img src="cousr en ligne.jpg" alt="Cours en ligne">
        <h3>Cours en ligne</h3>
      </div>

      <div class="card">
        <img src="coaching.jpg" alt="Coaching perso">
        <h3>Coaching perso</h3>
      </div>

      <div class="card">
        <img src="performance.png" alt="Suivi de progression">
        <h3>Suivi de progression</h3>
      </div>

      <div class="card">
        <img src="communauté.png" alt="Communauté">
        <h3>Communauté</h3>
      </div>

    </div>
  </div>

</body>
</html>
